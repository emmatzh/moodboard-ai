<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MoodBoard AI</title>
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
</head>
<body>

  <!-- NAV TABS -->
  <nav>
    <button onclick="showTab('moodboard')" id="tab-moodboard" class="tab-btn active">🎨 Moodboard</button>
    <button onclick="showTab('checkin')" id="tab-checkin" class="tab-btn">🌿 Daily Check-in</button>
  </nav>

  <!-- MOODBOARD TAB -->
  <section id="moodboard-tab">
    <h1>MoodBoard AI</h1>
    <p class="subtitle">Describe a vibe and we'll build your aesthetic.</p>

    <div class="input-row">
      <input type="text" id="vibeInput" placeholder="e.g. cozy autumn cabin, warm tea..." />
      <button id="generateBtn" onclick="generateMoodboard()">Generate ✨</button>
    </div>

    <div class="upload-section">
      <label for="imageUpload" class="upload-label">+ Add your own photo</label>
      <input type="file" id="imageUpload" accept="image/*" />
      <img id="userImage" style="display:none;" />
    </div>

    <div id="loader" style="display:none;">✨ Generating your vibe...</div>
    <div id="board" style="display:none;"></div>
  </section>

  <!-- CHECKIN TAB -->
  <section id="checkin-tab" style="display:none;">
    <h1>Daily Check-in 🌿</h1>
    <p class="subtitle">How are you feeling today?</p>

    <div id="emojiPicker">
      <button class="emoji-btn" data-mood="happy" onclick="selectMood(this)">😊</button>
      <button class="emoji-btn" data-mood="sad" onclick="selectMood(this)">😔</button>
      <button class="emoji-btn" data-mood="angry" onclick="selectMood(this)">😤</button>
      <button class="emoji-btn" data-mood="tired" onclick="selectMood(this)">😴</button>
      <button class="emoji-btn" data-mood="anxious" onclick="selectMood(this)">😰</button>
      <button class="emoji-btn" data-mood="excited" onclick="selectMood(this)">🤩</button>
    </div>

    <textarea id="dayInput" placeholder="Tell us about your day..."></textarea>
    <button id="affirmBtn" onclick="getAffirmation()">Get My Affirmation 💫</button>

    <div id="affirmLoader" style="display:none;">Finding the right words...</div>
    <div id="affirmCard" style="display:none;"></div>
  </section>

  <script src="script.js"></script>
</body>
</html>
